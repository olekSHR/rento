services:
  db:
    image: postgres:16
    container_name: rento_db

    environment:
      POSTGRES_DB: rento_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend

    container_name: rento_backend

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/uploads:/app/uploads

    ports:
      - "8000:8000"

    depends_on:
      - db

  frontend:
    build:
      context: ./frontend

    container_name: rento_frontend

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: